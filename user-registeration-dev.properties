############################
# App Info
############################
spring.application.name=user-registeration
server.port=8083

############################
# Profiles
############################
spring.profiles.active=dev
spring.cloud.config.enabled=true

############################
# Eureka Client Config
############################
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

############################
# Database (MySQL)
############################
spring.datasource.url=jdbc:mysql://mysql:3306/user_db
spring.datasource.username=root
spring.datasource.password=master
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
# JPA & Hibernate
############################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

############################
# JWT Security
############################
security.jwt.expiration-ms=3600000   
security.jwt.secret=${JWT_SECRET:defaultSecretKeyChangeMe}
############################
# Mail Config (optional — starter present)
############################
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=harshavardhan.harish@gmail.com
spring.mail.password=your_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

############################
# Actuator
############################
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
